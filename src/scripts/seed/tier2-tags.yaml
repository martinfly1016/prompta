tags:
  - slug: セーラー服
    name: セーラー服
    color: pink
    isApproved: true
    seoTitle: 「セーラー服」プロンプト集｜Stable Diffusion 呪文・コピペOK
    seoDescription: セーラー服プロンプトのコピペ集。夏服・冬服・リボン色・プリーツスカートの指定方法まで、Stable Diffusion・NovelAI・Midjourney で使える呪文を画像付きで紹介。
    seoIntro: >
      セーラー服プロンプトは、AIイラスト生成で女子高生や学園キャラクターを描く際の基本的な衣装指定です。「sailor uniform」「sailor school uniform」を基本に、リボンの色（red ribbon,
      blue ribbon）、襟（sailor collar）、袖の長さ（short sleeves, long sleeves）、スカートのプリーツ（pleated
      skirt）を組み合わせることで、理想のセーラー服デザインを再現できます。


      Stable Diffusion や NovelAI では、プロンプトの先頭側に「sailor uniform, pleated skirt」を置くと衣装の優先度が上がります。夏服なら「white sailor uniform,
      short sleeves, summer uniform」、冬服なら「navy sailor uniform, long sleeves, winter uniform」のように季節も明示すると精度が高まります。


      組み合わせ例：

      - 夏のシンプルな白セーラー：「white sailor uniform, red ribbon, pleated skirt, summer」

      - 冬の定番紺セーラー：「navy sailor uniform, white scarf, long sleeves, pleated skirt」

      - アニメ風アクセント：「(sailor uniform:1.2), hair ribbon, knee-high socks, loafers」


      色滲み（color bleed）が出る場合は、BREAK コマンドや重み付け（:1.2 など）で各要素の独立性を高めてください。ネガティブプロンプトに「casual clothes,
      t-shirt」を入れると制服指定がより安定します。
  - slug: スレンダー
    name: スレンダー
    color: blue
    isApproved: true
    seoTitle: 「スレンダー」プロンプト集｜痩せ型・細身キャラの呪文
    seoDescription: AIイラストで痩せ型・細身キャラを描くスレンダー体型プロンプト集。Stable Diffusion・NovelAI 対応。身長指定やネガティブプロンプトとの組み合わせパターンも紹介。
    seoIntro: >
      スレンダープロンプトは、AIイラスト生成でスリムで細身なキャラクターを表現するための体型指定です。「slender」「slim」「thin」を基本に、身長（tall, average height）、脚の長さ（long
      legs, leggy）、体つき（delicate frame, narrow waist）を組み合わせて、理想のスレンダーシルエットを作り出せます。


      Stable Diffusion では「slender, slim waist」を高めの重み（例：(slender:1.2)）で置くと細身が強調されますが、1.4
      を超えると体が崩れやすいので注意してください。「skinny」は骨ばった印象が強く、カジュアルなスレンダー表現には「slim」「slender」の方が自然です。年齢表現も「young
      adult」「teenager」などを併記すると体型との整合性が取れます。


      組み合わせ例：

      - モデル風：「slender, tall, long legs, narrow waist, elegant pose」

      - アイドル風：「slim, petite frame, slender figure, cute outfit」

      - リアル系：「slender body, athletic build, natural posture, photo realistic」


      ネガティブプロンプトに「chubby, overweight, thick body, muscular」を入れると、スレンダー指定がより安定します。体型プロンプトは服装との相性で見え方が変わるため、「form-fitting
      dress」「slim jeans」など体のラインが出る衣装と組み合わせると意図が伝わりやすくなります。
  - slug: 体格差
    name: 体格差
    color: purple
    isApproved: true
    seoTitle: 「体格差」プロンプト集｜身長差・カップリング構図の呪文
    seoDescription: AIイラストで身長差・体格差のあるキャラクター2人を描くプロンプト集。Stable Diffusion・NovelAI 対応。男女ペア・BL 構図・親子構図などの指定例を紹介。
    seoIntro: >
      体格差プロンプトは、AIイラストで身長や体つきの異なる 2 人以上のキャラクターを同じ画面に描くための構図指定です。「height difference」「size difference」「tall and
      short」を基本に、体格（muscular man, petite woman）、立ち位置（standing next to, looking up, looking down）を組み合わせて、ペアの関係性を視覚化できます。


      Stable Diffusion では複数キャラ構図は崩れやすいため、「2people」「two characters」など人数指定に加え、「height
      difference」を明示すると安定します。男女差・兄妹差・カップリング構図など、用途に応じて形容詞を切り替えましょう。NovelAI なら Artist タグと組み合わせると体格差表現がさらに安定します。


      組み合わせ例：

      - 男女の身長差：「tall man and petite woman, height difference, looking up, couple」

      - BL 構図：「tall muscular man, shorter slender man, height difference, standing together」

      - 親子構図：「adult and child, size difference, hand holding, warm lighting」


      ネガティブプロンプトには「same height, same size」を入れると体格差が保たれやすくなります。また、「full body」で全身を描くことで差が視覚的に伝わりやすくなります。
  - slug: ファンタジー衣装
    name: ファンタジー衣装
    color: green
    isApproved: true
    seoTitle: 「ファンタジー衣装」プロンプト集｜RPG・中世・魔法使い呪文
    seoDescription: 剣士・魔法使い・騎士など RPG 風ファンタジー衣装のプロンプト集。Stable Diffusion・Midjourney 対応。職業別・素材別の呪文例と装飾の指定方法を紹介。
    seoIntro: >
      ファンタジー衣装プロンプトは、AIイラストで RPG・中世・魔法世界の住人を描くための衣装指定です。「fantasy outfit」「medieval armor」「mage robe」を基本に、職業（knight,
      wizard, elf, warrior, archer）、素材（leather, silk, metal plate, chainmail）、装飾（embroidery, runes, glowing
      gem）を組み合わせることで、物語性のあるキャラクター衣装を表現できます。


      Stable Diffusion では「fantasy」単体では抽象的すぎるため、「dark fantasy」「high fantasy」「RPG style」などジャンルを明示し、「detailed armor,
      intricate embroidery」で細部を強化するのがコツです。Midjourney なら --stylize 300 以上で装飾表現が際立ちます。性別・年齢を明示するとキャラ像が安定します。


      組み合わせ例：

      - 女戦士：「female warrior, leather armor, sword, long cape, fantasy world」

      - 魔法使い：「young mage, blue robe, star embroidery, glowing staff, floating runes」

      - エルフ弓使い：「elf archer, green tunic, leaf ornament, forest background, fantasy」


      ネガティブプロンプトに「modern clothes, t-shirt, jeans, casual wear」を入れると現代服が混入しにくくなります。世界観を強化したいときは「epic scene, dramatic
      lighting」を追加すると画像全体の完成度が上がります。
  - slug: 制服
    name: 制服
    color: blue
    isApproved: true
    seoTitle: 「制服」プロンプト集｜セーラー服・学生服・スーツの呪文・コピペOK
    seoDescription: 制服プロンプトのコピペ集。学生服・セーラー服・ビジネススーツなど、Stable Diffusion で使える呪文を画像付きで紹介。色・素材・シーン別の使い分けも解説。
    seoIntro: >
      制服プロンプトは、AIイラスト生成で学校の学生服・職業ユニフォーム・コスチュームを正確に表現するための基本呪文です。「school uniform」「sailor uniform」「business suit」「nurse
      uniform」「military uniform」など、シーンに応じた英単語を選ぶことで、統一感のあるキャラクターイメージを安定して生成できます。


      Stable Diffusion では「school uniform」単体では解釈が広すぎるため、「Japanese school uniform, sailor collar, pleated
      skirt」のようにディテールを並列すると再現精度が大きく上がります。NovelAI では「(school uniform:1.2)」のように重み付けをかけるのがコツ。色指定は「white shirt, navy skirt,
      red ribbon」と分解して書くと BREAK コマンド無しでも色滲みを抑えられます。


      組み合わせ例：

      - 日本の学生服：「Japanese school uniform, white shirt, navy blazer, red tie, plaid pleated skirt, knee-high socks,
      loafers」

      - ビジネス系：「business suit, white blouse, black pencil skirt, black pumps, hair tied up」

      - 職業制服：「nurse uniform, white cap, scrubs, stethoscope」


      ネガティブプロンプトに「casual, t-shirt, torn clothes, mismatched uniform」を入れると制服感が保たれやすくなります。
  - slug: プリーツスカート
    name: プリーツスカート
    color: pink
    isApproved: true
    seoTitle: 「プリーツスカート」プロンプト集｜学生服・カジュアルの呪文
    seoDescription: プリーツスカートプロンプトのコピペ集。学生服・ミニ丈・ロング丈・カラー指定まで、Stable Diffusion で再現する呪文を画像付きで紹介。
    seoIntro: >
      プリーツスカートプロンプトは、AIイラスト生成で学生服やカジュアルファッションに欠かせない日本的なアイテム表現です。「pleated skirt」を基本に、色（navy pleated skirt, plaid pleated
      skirt）、丈（mini pleated skirt, knee-length pleated skirt）、素材（wool pleated skirt, chiffon pleated
      skirt）を指定することで、理想のスカートを再現できます。


      Stable Diffusion では「pleated skirt」だけだと長さが不安定になるため、「knee-high pleated skirt」や「micro pleated
      skirt」のように丈を明示するのがコツです。色指定は BREAK コマンドと組み合わせて「white blouse BREAK navy pleated
      skirt」と書くと上下の色混じりが起きにくくなります。重み付けは「(pleated skirt:1.2)」程度が安定圏。


      組み合わせ例：

      - 定番学生服：「school uniform, white blouse, navy pleated skirt, knee-high socks, loafers」

      - カジュアル：「casual outfit, white t-shirt, pink pleated mini skirt, sneakers, denim jacket」

      - ゴシック系：「gothic lolita, black pleated skirt, lace trim, platform boots」


      ネガティブに「straight skirt, tight skirt, wrinkled skirt」を入れるとプリーツが消えるのを防げます。プリーツの本数を強調したいときは「many pleats」や「accordion
      pleats」も効果的です。
  - slug: ドレス
    name: ドレス
    color: pink
    isApproved: true
    seoTitle: 「ドレス」プロンプト集｜イブニング・カクテル・ウェディングの呪文
    seoDescription: ドレスプロンプトのコピペ集。イブニングドレス・カクテルドレス・ウェディングドレス・ファンタジードレスまで、Stable Diffusion で再現する呪文を画像付きで紹介。
    seoIntro: >
      ドレスプロンプトは、AIイラスト生成でエレガントな女性キャラクターを表現するための基本呪文です。「dress」「evening gown」「cocktail dress」「wedding dress」「fantasy
      dress」など、シーン別の英単語を選び、色・素材・ディテールを積み重ねて理想のドレスを作ります。


      Stable Diffusion では「red dress」だけだと質感が曖昧になるため、「red silk evening dress, floor-length,
      backless」のように素材・丈・ディテールを追加するのがコツです。Midjourney なら「--style raw --ar 2:3」で実写風のドレスポートレートに近づきます。NovelAI では Artist
      タグと組み合わせるとイラスト調の華やかなドレスが安定します。


      組み合わせ例：

      - フォーマル：「elegant evening gown, red silk, floor-length, backless, diamond necklace, high heels」

      - カクテル：「black cocktail dress, knee-length, lace detail, pearl earrings, clutch bag」

      - ウェディング：「white wedding dress, long train, veil, bouquet, soft lighting」

      - ファンタジー：「ethereal fantasy dress, flowing sleeves, floral embroidery, crown, magical aura」


      ネガティブプロンプトに「casual, jeans, t-shirt, torn, simple」を入れるとドレスの華やかさが保たれやすくなります。シルエットを美しく出したいときは「hourglass figure,
      elegant pose」を併記するのが定番です。
  - slug: ポートレート
    name: ポートレート
    color: blue
    isApproved: true
    seoTitle: 「ポートレート」プロンプト集｜高品質・光・背景
    seoDescription: ポートレート撮影プロンプト55個。顔立ち、ライティング、背景を指定して、美しい人物画像を生成。Stable Diffusion・Midjourney対応。
    seoIntro: >-
      「ポートレートプロンプトは、顔や半身を美しく引き出すAI画像生成の定番スタイルです。照明、肌質、背景などの要素を細かく指定することで、プロフェッショナルな写真品質の結果が得られます。


      ポートレート生成のコツは、照明条件（soft light, golden hour, studio lighting）と顔の向き（looking at camera, three-quarter
      view）、背景の簡潔さ（blurred background, neutral background）を組み合わせることです。肌質やメイクの詳細度を調整することで、完成度が大きく変わります。


      組み合わせ例：

      ・「beautiful woman, soft studio lighting, sharp focus on face, detailed skin」

      ・「male portrait, golden hour light, cinematic color grading, blurred background」

      ・「asian girl, professional photography, shallow depth of field, warm skin tone」


      ネガティブプロンプトで「blurry, low quality, deformed face」を除外することが重要です。
  - slug: クリエイティブ
    name: クリエイティブ
    color: blue
    isApproved: true
    seoTitle: 「クリエイティブ」プロンプト集｜アート・表現
    seoDescription: クリエイティブなAI画像生成プロンプト50個。アート、デザイン、イラスト表現。Stable Diffusion・Midjourney向け実例集。
    seoIntro: >-
      「クリエイティブプロンプトは、既存のスタイルに縛られない、ユニークで個性的なビジュアル表現を生み出すAI画像生成の手法です。アーティストの名前、美術運動、実験的なスタイル記述を組み合わせることで、他にない創造的な結果を得られます。


      クリエイティブ生成を成功させるには、複数のスタイル要素を組み合わせ（surrealism + watercolor + geometric）、芸術家の参考指定（style of Hokusai, inspired by
      Beeple）、感情的なムード（dreamlike, ethereal, chaotic）を混ぜることが効果的です。


      組み合わせ例：

      ・「surreal digital art, vibrant colors, abstract geometric shapes, dreamy atmosphere」

      ・「illustration by Studio Ghibli, watercolor blending, soft focus, magical light」

      ・「contemporary art, mixed media, bold brushstrokes, experimental composition」


      アートの方向性が曖昧すぎると、不安定な結果になるため、具体的な美術用語を3～4個組み合わせることをお勧めします。
  - slug: 衣装
    name: 衣装
    color: blue
    isApproved: true
    seoTitle: 「衣装」プロンプト集｜デザイン・コスチューム
    seoDescription: 衣装デザインプロンプト46個。ドレス、ジャケット、特殊衣装。Stable Diffusion・Midjourney対応の画像生成例。
    seoIntro: >-
      「衣装プロンプトは、キャラクターやモデルが着る衣服のディテールを細かく指定して、AI画像生成するスタイルです。布地感、装飾、シルエット、色合いを組み合わせることで、イメージ通りのコスチュームが完成します。


      衣装デザイン生成のコツは、衣装の種類（dress, suit, gown）、素材（silk, leather, velvet）、装飾要素（embroidered, sequined,
      ruffled）を明確に指定し、全体のシルエット（flowing, fitted, layered）を描写することです。照明で生地の質感がより際立ちます。


      組み合わせ例：

      ・「elegant black dress, flowing silk fabric, embroidered details, off-shoulder」

      ・「steampunk costume, leather jacket, brass buckles, Victorian style」

      ・「ethereal gown, translucent layers, pearl beading, iridescent fabric」


      ネガティブプロンプトに「wrinkled, dirty, torn」を含めることで、衣装の完成度を保つことができます。
  - slug: シネマティック
    name: シネマティック
    color: blue
    isApproved: true
    seoTitle: 「シネマティック」プロンプト集｜映画・光
    seoDescription: シネマティック映像プロンプト42個。映画のような構図、ライティング、カラーグレーディング。Midjourney・SD対応。
    seoIntro: >-
      「シネマティックプロンプトは、映画やハリウッド製作のような高い完成度と映像美を再現するAI画像生成スタイルです。撮影技法、照明、色彩設定、構図を映画的に組み立てることで、スクリーンから飛び出すような迫力ある画像が生成されます。


      シネマティック映像を生み出すコツは、カメラアングル（wide shot, close-up, Dutch angle）、ライティング手法（volumetric lighting, lens flare, rim
      lighting）、色彩グレード（warm color grade, desaturated, cinematic color）を同時に指定することです。フレーム構成も意識します。


      組み合わせ例：

      ・「cinematic wide shot, volumetric lighting, golden hour, shallow depth of field, movie still」

      ・「dramatic lighting, deep shadows, cool color grading, professional cinematography」

      ・「epic scene, high-angle shot, lens flare, atmospheric haze, blockbuster aesthetic」


      「film grain, 35mm」などのカメラ記述を加えると、より映像的な仕上がりになります。
  - slug: chatgpt
    name: ChatGPT
    color: blue
    isApproved: true
    seoTitle: 「ChatGPT」プロンプト集｜質問・回答・文章
    seoDescription: ChatGPT用プロンプト40個。質問、回答、文章作成などテキスト生成のコツ。実務的なプロンプト例を紹介。
    seoIntro: >-
      「ChatGPTプロンプトは、OpenAIのChatGPTから高品質な回答や文章を引き出すための質問・指示文です。具体的なタスク設定、出力形式の指定、コンテキスト情報を含めることで、期待通りの結果を得られます。


      ChatGPT
      の効果を最大化するコツは、役割指定（「あなたはプロの編集者です」）、タスクの明確化（「300字の記事を書いてください」）、出力フォーマット指定（「箇条書き、JSON形式」）、そして具体例の提示です。制約条件を明確にするほど、精度が高まります。


      組み合わせ例：

      ・「あなたはプロのライターです。以下のトピックで500字の記事を書いてください：[トピック]」

      ・「JSON形式で、商品のメリット3点とデメリット2点を構造化してください」

      ・「初心者向けに、[概念]を100字以内で分かりやすく説明してください」


      出力後に「これをもっと短くしてください」といった追加指示で、結果を微調整できます。
  - slug: ファンタジー
    name: ファンタジー
    color: blue
    isApproved: true
    seoTitle: 「ファンタジー」プロンプト集｜魔法・冒険・世界観
    seoDescription: ファンタジー画像生成プロンプト34個。魔法、ドラゴン、異世界。Stable Diffusion・Midjourney対応の幻想的な表現。
    seoIntro: >-
      「ファンタジープロンプトは、魔法、冒険、異世界といった幻想的な世界観をAI画像生成で表現するスタイルです。架空の生き物、魔法効果、異世界の環境描写を組み合わせることで、ゲームやファンタジー小説から出てきたようなビジュアルが実現します。


      ファンタジー世界観を豊かに描くコツは、舞台設定（ancient ruins, enchanted forest, magical realm）、キャラクター属性（elf, wizard,
      dragon）、ビジュアルエフェクト（magical aura, glowing runes, spell effects）を具体的に指定することです。光の魔法的な表現が雰囲気を左右します。


      組み合わせ例：

      ・「elf warrior, enchanted forest, magical aura, glowing staff, fantasy armor」

      ・「dragon perched on mountain, golden light, ancient ruins, mystical atmosphere」

      ・「wizard casting spell, swirling magical energy, moonlit night, ethereal glow」


      ネガティブプロンプトで「modern elements, technology」を除外すると、ファンタジー世界の一貫性が保たれます。
  - slug: ビジネス
    name: ビジネス
    color: blue
    isApproved: true
    seoTitle: 「ビジネス」プロンプト集｜企画・報告・営業
    seoDescription: ビジネス・企画向けプロンプト33個。企画書作成、提案資料、営業トーク。ChatGPT・Claude対応の実務例。
    seoIntro: >-
      「ビジネスプロンプトは、企画、提案、報告書作成といったビジネス業務を効率化するChatGPT・Claude向けの指示文です。提案の背景、目的、出力形式を明確に指示することで、即座に使える業務文書や戦略案が生成されます。


      ビジネスプロンプトを活用するコツは、対象者の明確化（「経営層向けに」「営業担当者向けに」）、成果物の具体指定（「3ページの企画書」「5つの提案案」）、トーン設定（「フォーマルに」「カジュアルに」）です。背景情報も含めると、より的確な回答が得られます。


      組み合わせ例：

      ・「新規サービスの企画書を3項目（背景・提案・予算）で作成してください」

      ・「以下の製品のセールスピッチを営業向けに200字でまとめてください」

      ・「プロジェクト報告書を経営層向けにMarkdown形式で構成してください」


      プロンプト内で「SMART目標」など具体的なフレームワークを指定すると、より実用的な結果になります。
  - slug: 服装
