    seoDescription: 創造的思考を引き出すためのAIプロンプト集。ChatGPT・Claudeで創造性・想像力・新しい視点を開発するテクニック。
    seoIntro: >-
      「創造性プロンプトは、ChatGPT・Claudeで創造的思考・想像力・新しい視点開発を効果的に引き出すための指示文です。」perspective shifting（視点転換）、analogy-based
      thinking（類推的思考）、constraint
      removal（制約除去）などを組み合わせます。効果的なテクニックは、通常と異なる思考枠組みを提示し、「創造性の敵は批判」という心理的安全性を確保し、斬新な案を褒めること。「組み合わせ例：」・Imagine you're a
      [unexpected role], how would you approach [problem]?・Connect [unrelated topic A] and [topic B] to generate a novel
      idea・Remove all constraints: if [limitation] didn't exist, what would you do?。複数案比較は「which idea is most creative
      and why」で評価基準を統一します。
